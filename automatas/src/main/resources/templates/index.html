<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <title>Práctica 5 - Autómatas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <div class="card shadow p-4">

        <h2 class="mb-4 text-center">
            Validación de Cadenas
        </h2>

        <form method="post" action="/validar">

            <div class="mb-3">
                <label class="form-label">Seleccione el autómata</label>

                <select class="form-select" name="automata">
                    <option value="iot">Telemetría IoT</option>
                    <option value="genetico">Secuencias Genéticas</option>
                    <option value="ecommerce">E-commerce</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Ingrese la cadena</label>

                <input type="text"
                       class="form-control"
                       name="cadena"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-primary w-100">
                Validar
            </button>

        </form>

        <div class="mt-4" th:if="${resultado != null}">

            <div th:if="${resultado}"
                 class="alert alert-success">

                Cadena válida
            </div>

            <div th:unless="${resultado}"
                 class="alert alert-danger">

                Cadena inválida
            </div>

        </div>

    </div>

</div>

</body>
</html>
